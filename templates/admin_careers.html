<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Stream</title>
  <link rel="stylesheet" href="/static/css/admin_style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
  <div class="container">

    <!-- Logo + Brand -->
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('admin_dashboard') }}">
      <img src="{{ url_for('static', filename='images/pathpilot-logo.png') }}"
           alt="PathPilot"
           height="40"
           class="logo-img">

      <span class="brand-text">PathPilot</span>
    </a>

    <!-- Right Buttons -->
    <div class="nav-buttons">
      <a class="btn-light nav-btn" href="{{ url_for('admin_dashboard') }}">
        Home
      </a>

      {% if admin_logged_in %}
      <a class="btn-danger logout-pill" href="{{ url_for('admin_logout') }}">
        Logout
      </a>
      {% endif %}
    </div>

  </div>
</nav>

<div class="career-cloud">
  <span>Engineering</span>
  <span>AI</span>
  <span>Data Science</span>
  <span>MBA</span>
  <span>Medicine</span>
  <span>Law</span>
  <span>Design</span>
  <span>Startups</span>
  <span>Research</span>
  <span>Government</span>
</div>

<div class="page-content">
  <div class="select-card">
    <h2>Select Course</h2>

    <div class="options">
      {% for c in careers %}
        <a href="/admin_questions/{{c.id}}" class="option-btn">
          {{ c.career_name }}
        </a>
      {% endfor %}
    </div>

    <a href="/admin_streams" class="back-btn">Back</a>
  </div>
</div>

</body>
</html>
