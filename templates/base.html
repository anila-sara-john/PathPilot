<!DOCTYPE html>
<html>
<head>
    <title>PathPilot</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- =========================
            NAVBAR
    ========================== -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img
                    src="{{ url_for('static', filename='images/pathpilot-logo.png') }}"
                    alt="PathPilot"
                    height="40"
                    class="me-2"
                >
                <span class="logo-text">
                    PathPilot
                </span>
            </a>

            <!-- Buttons -->
            <div class="d-flex gap-2">
                {% if page != "home" %}
                <a class="btn btn-home nav-btn" href="/">
                    Home
                </a>
                {% endif %}
                {% if user_logged_in %}
                <a class="btn btn-results nav-btn" href="/results-history">
                    View Past Results
                </a>
                <a class="btn btn-danger nav-btn" href="/logout">
                    Logout
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- =========================
        MAIN CONTENT
    ========================== -->

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
    
</body>

</html>
