<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Career | PathPilot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_style.css') }}">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container">
      <!-- Logo -->
      <a class="navbar-brand d-flex align-items-center" href="{{ url_for('admin_dashboard') }}">
        <img src="{{ url_for('static', filename='images/pathpilot-logo.png') }}" alt="PathPilot" height="40"
          class="logo-img">
        <span class="brand-text">PathPilot</span>
      </a>

      <!-- Buttons -->
      <div class="nav-buttons">
        <a class="btn-light nav-btn" href="{{ url_for('admin_dashboard') }}">Home</a>
        {% if admin_logged_in %}
        <a class="btn-danger logout-pill" href="{{ url_for('admin_logout') }}">
          Logout
        </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="edit-card">
    <h2>Edit Career Name</h2>
    <form action="{{ url_for('edit_career', career_id=career['id']) }}" method="POST" class="edit-form">
      <label for="career_name">
        Current Name: <strong>{{ career['career_name'] }}</strong>
      </label>

      <input type="text" name="career_name" id="career_name" value="{{ career['career_name'] }}" required>
      <div class="btn-group">
        <button type="submit" class="update-btn">
          Update Career
        </button>

        <a href="{{ url_for('admin_manage_careers_list', stream_id=career['stream_id']) }}" class="back-btn"
          style="padding:10px 20px; border-radius:6px; text-decoration:none; color:white;">
          Cancel
        </a>
      </div>
    </form>
  </div>
</body>
</html>
