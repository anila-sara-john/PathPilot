{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center">
  <div class="login-card stream-box">

    <!-- Back button -->
    <div class="top-back">
      <a href="{{ url_for('home') }}" class="btn btn-secondary back-btn">
        ← Back
      </a>
    </div>

    <h2>Choose Your Stream</h2>

    <p class="message-text">
      Select the stream that best represents your academic background.
    </p>

    <input
        type="text"
        id="streamSearch"
        class="stream-search"
        placeholder="Search streams..."
    >

    <form method="POST" action="/stream-selection">

      <div class="stream-grid">

        {% for stream in streams %}

        <label class="stream-option">
          <input type="radio" name="stream" value="{{ stream }}"
          {% if selected_stream == stream %}checked{% endif %} required>
          <span>{{ stream }}</span>
        </label>

        {% endfor %}

      </div>

      <div class="submit-area">
        <button type="submit" class="login-btn">
          Continue 
        </button>
      </div>

    </form>

  </div>
</div>

<script>
const searchInput=document.getElementById("streamSearch");
const options=document.querySelectorAll(".stream-option");

searchInput.addEventListener("keyup",function(){
    const value=this.value.toLowerCase();

    options.forEach(option=>{
        const text=option.innerText.toLowerCase();

        if(text.includes(value)){
            option.style.display="block";
        }else{
            option.style.display="none";
        }
    });
});
</script>

{% endblock %}
