<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Edit Question | PathPilot</title>
  <link rel="stylesheet" href="/static/css/admin_style.css">
</head>

<body>
  <!-- Standard PathPilot Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container">
      <!-- Logo + Brand -->
      <a class="navbar-brand d-flex align-items-center" href="{{ url_for('admin_dashboard') }}">
        <img src="{{ url_for('static', filename='images/pathpilot-logo.png') }}" alt="PathPilot" height="40"
          class="logo-img">
        <span class="brand-text">PathPilot</span>
      </a>

      <!-- Right Buttons -->
      <div class="nav-buttons">
        <a class="btn-light nav-btn" href="{{ url_for('admin_dashboard') }}">
          Home
        </a>

        {% if admin_logged_in %}
        <a class="btn-danger logout-pill" href="{{ url_for('admin_logout') }}">
          Logout
        </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="page-content">
    <div class="edit-card">
      <h2>Edit Question</h2>
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="flash-message {{ category }}">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST" class="edit-form">
        <label>Question</label>
        <input type="text" name="question" value="{{ q['question_text'] }}" required>
        <label>Weight</label>
        <input type="number" name="weight" value="{{ q['weight'] }}" min="1" max="100" required>
        <div class="btn-group">
          <button type="submit" class="update-btn">
            Update Question
          </button>
          <a href="{{ back_url }}" class="back-btn">
            Back
          </a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
