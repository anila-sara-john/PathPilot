<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Question | PathPilot</title>
  <link rel="stylesheet" href="/static/css/admin_style.css">
</head>

<body>

<!-- Standard PathPilot Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
  <div class="container">

    <!-- Logo + Brand -->
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('admin_dashboard') }}">
      <img src="{{ url_for('static', filename='images/pathpilot-logo.png') }}"
           alt="PathPilot"
           height="40"
           class="logo-img">

      <span class="brand-text">PathPilot</span>
    </a>

    <!-- Right Buttons -->
    <div class="nav-buttons">
      <a class="btn-light nav-btn" href="{{ url_for('admin_dashboard') }}">
        Home
      </a>

      {% if admin_logged_in %}
      <a class="btn-danger logout-pill" href="{{ url_for('admin_logout') }}">
        Logout
      </a>
      {% endif %}
    </div>

  </div>
</nav>

<div class="page-content">

  <div class="welcome-box">
    <h1>Add New Question</h1>
    <p>Add questions for the career questionnaire</p>
  </div>

  <div class="login-card add-question-card">

    <div class="form-container">

      <form method="POST">

        <label class="form-label">Question</label>
        <input type="text"
               name="question"
               class="form-input"
               placeholder="Enter the questionnaire question"
               required>

        <br>

        <label class="form-label">Weight</label>
        <input type="number"
               name="weight"
               class="form-input"
               placeholder="Enter question weight"
               min="1"
               max="5"
               required>

        <br>

        <button type="submit" class="add-question-btn">
          Add Question
        </button>

      </form>

      <br>

      <a href="{{ back_url }}" class="dashboard-btn back-btn">
        ⬅ Back to Questions
      </a>

    </div>

  </div>

</div>

</body>
</html>
