<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Stream | PathPilot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_style.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('admin_dashboard') }}">
                <img src="{{ url_for('static', filename='images/pathpilot-logo.png') }}" alt="PathPilot" height="40"
                    class="logo-img">
                <span class="brand-text">PathPilot</span>
            </a>
            <!-- Buttons -->
            <div class="nav-buttons">
                <a class="btn-light nav-btn" href="{{ url_for('admin_manage_streams') }}">
                    Home
                </a>
                <a class="btn-danger logout-pill" href="{{ url_for('admin_logout') }}">
                    Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="edit-card">
        <h2>Edit Stream Name</h2>
        <form action="{{ url_for('edit_stream', stream_id=stream['id']) }}" method="POST" class="edit-form">
            <label for="stream_name">
                Current name: <strong>{{ stream['stream_name'] }}</strong>
            </label>
            <input type="text" name="stream_name" id="stream_name" value="{{ stream['stream_name'] }}" required
                placeholder="Enter new stream name">
            <div class="btn-group">
                <button type="submit" class="update-btn">
                    Update Stream
                </button>
                <a href="{{ url_for('admin_manage_streams') }}" class="back-btn"
                    style="padding: 10px 20px; border-radius: 6px; text-decoration: none; color: white;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
